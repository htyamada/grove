# imhandler default configuration — do not edit.
# Maintained in the grove repository at etc/imhandler.conf.
# Edit this file to customise imhandler paths.
#
#   [hty7.imhandler.core]
#   # Directory (or list) to browse / default root for thumb and purge.
#   # Single string, plain list, or list of {path, name} tables:
#   image_root = "~/Pictures"
#   # image_root = ["~/Pictures", "~/ExtraPhotos"]
#   # image_root = [
#   #     {path = "~/Pictures",   name = "Main"},
#   #     {path = "~/ExtraPhotos", name = "Extra"},
#   # ]
#
#   # Root for all generated files (thumbnails, database, weights):
#   cache_dir = "~/var/imhandler/cache"
#
#   [qat.imhandler.core]
#   image_root = "~/qat/images"
#   cache_dir = "~/var/qat/imhandler/cache"

[hty7.imhandler.core]
image_root = [
    {
        path = "/srv/cloud/OpahSSD/pictures/my-mac-photos/exports",
        name = "mac exports"
    }
]
cache_dir = "~/var/hty7/imhandler/cache"

[qat.imhandler.core]
image_root = [
    {
        path = "/srv/ext/qat/pictures",
        name = "qat pictures"
    }
]
cache_dir = "~/var/qat/imhandler/cache"
